 #    - name: Проверка наличия локального архива с образом Python
 #      stat:
 #        path: "/home/{{ app_user }}/app/python-3.11-slim.tar"
 #      register: python_image_file
# 
 #    - name: Загрузка образа Python из локального файла (без интернета)
 #      shell: "podman load -i /home/{{ app_user }}/app/python-3.11-slim.tar"
 #      when: python_image_file.stat.exists
 #      become: yes
# 
 #    - name: Предварительное скачивание образа (если файла нет)
 #      shell: "podman pull docker.io/library/python:3.11-slim"
 #      when: not python_image_file.stat.exists
 #      async: 3600
 #      poll: 30
#      become: yes




    - name: Сборка и запуск контейнеров
      shell:
        cmd: "podman-compose up -d --build"
        chdir: "~/app"
      async: 3600 #60 minutes
      poll: 10 #status check every 10sec 
      environment:
        PIP_INDEX_URL: "https://mirror.yandex.ru/pypi/simple"
        DB_PASSWORD: "{{ vault_db_password }}"
        BOT_TOKEN: "{{ vault_vk_token }}"


    - name: Ожидание запуска контейнеров
      pause:
        seconds: 60


    - name: Применение миграций БД
      shell: "podman exec app_web_1 python manage.py migrate"

      run_once: true # это чтобы при запуске деплоя на нескольких нодах они все не ломанулись создавать миграции.


    - name: Генерация systemd юнитов для контейнеров
      shell: |
        podman generate systemd --name {{ item }} --files --new
        mv /home/{{ app_user }}/container-{{ item }}.service /home/{{ app_user }}/.config/systemd/user/
        systemctl --user daemon-reload
      args:
        chdir: "/home/{{ app_user }}"
      loop: [app_db_1, app_web_1, app_bot_1]


#    - name: Принудительно вписываем сеть в файлы юнитов
#      replace:
#        path: "/home/{{ app_user }}/.config/systemd/user/container-{{ item }}.service"
#        regexp: '--network-alias'
#        replace: '--network app_default --network-alias'
#      loop: [app_db_1, app_web_1, app_bot_1]


    - name: Включение сервисов
      systemd:
        name: "{{ item }}"
        scope: user
        enabled: yes
        state: started
      loop:
        - container-app_db_1.service
        - container-app_web_1.service
        - container-app_bot_1.service
